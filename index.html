<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Master - Spaced Repetition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10 text-white">
            <h1 class="text-4xl font-bold mb-2 tracking-tight">ENGLISH MASTER</h1>
            <p class="opacity-90">Học thông minh với Spaced Repetition (A1 - B1)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-upload mr-2"></i>Tải lên từ vựng</h2>
                    <input type="file" id="csvUpload" accept=".json" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"/>
                    <p class="text-xs text-gray-500 mt-2 italic">* Hỗ trợ file .json (Word, Definition, Level)</p>
                </div>

                <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-layer-group mr-2"></i>Tiến độ hôm nay</h2>
                    <div id="stats" class="space-y-2 text-gray-700">
                        <p>Từ mới: <span id="newWords" class="font-bold text-green-600">0</span></p>
                        <p>Cần ôn tập: <span id="reviewWords" class="font-bold text-orange-600">0</span></p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="cardContainer" class="relative h-80 w-full perspective-1000">
                    <div id="flashcard" class="card-inner relative w-full h-full shadow-2xl rounded-3xl bg-white flex flex-col items-center justify-center p-10 text-center">
                        <div class="absolute top-4 right-6 text-sm font-bold text-indigo-400" id="wordLevel">A1</div>
                        
                        <div id="cardFront" class="absolute inset-0 flex flex-col items-center justify-center p-6 backface-hidden">
                            <h3 id="wordText" class="text-5xl font-extrabold text-gray-800 mb-4">Hello</h3>
                            <button onclick="speakWord()" class="text-indigo-500 hover:text-indigo-700 transition"><i class="fas fa-volume-up text-2xl"></i></button>
                        </div>

                        <div id="cardBack" class="absolute inset-0 flex flex-col items-center justify-center p-6 backface-hidden" style="transform: rotateY(180deg); backface-visibility: hidden;">
                            <p id="wordDefinition" class="text-2xl text-gray-600 italic">Xin chào</p>
                            <p id="wordExample" class="mt-4 text-gray-500">"Hello! How are you?"</p>
                        </div>
                    </div>
                </div>

                <div class="mt-8 flex flex-wrap justify-center gap-4">
                    <button onclick="flipCard()" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-700 transition shadow-lg">Lật thẻ</button>
                    <div id="gradingButtons" class="hidden flex gap-2">
                        <button onclick="gradeWord(1)" class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-600">Quên</button>
                        <button onclick="gradeWord(3)" class="bg-yellow-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-yellow-600">Khó</button>
                        <button onclick="gradeWord(5)" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600">Dễ</button>
                    </div>
                </div>

                <div class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-2xl">
                        <h4 class="font-bold mb-2"><i class="fas fa-microphone mr-2"></i>Luyện Nói (Speaking)</h4>
                        <button onclick="startListening()" class="w-full bg-indigo-100 text-indigo-700 py-2 rounded-lg hover:bg-indigo-200 transition">Nhấn để phát âm</button>
                        <p id="speechResult" class="mt-2 text-sm italic text-gray-600"></p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <h4 class="font-bold mb-2"><i class="fas fa-pen mr-2"></i>Luyện Viết (Writing)</h4>
                        <input type="text" id="writingInput" placeholder="Nhập từ vựng nghe được..." class="w-full border-b-2 border-indigo-300 focus:outline-none focus:border-indigo-600 p-1 bg-transparent">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Thuật toán Spaced Repetition (SM-2 tối giản)
        // Dữ liệu mẫu (A1-B1)
        let vocabulary = [
            { word: "Beautiful", definition: "Xinh đẹp", level: "A1", example: "She is beautiful", interval: 1, repetition: 0, efactor: 2.5, dueDate: Date.now() },
            { word: "Challenge", definition: "Thử thách", level: "B1", example: "A new challenge", interval: 1, repetition: 0, efactor: 2.5, dueDate: Date.now() }
        ];

        let currentCardIndex = 0;

        // Khởi tạo
        function init() {
            const saved = localStorage.getItem('myVocab');
            if (saved) vocabulary = JSON.parse(saved);
            updateStats();
            showCard();
        }

        function showCard() {
            const card = vocabulary[currentCardIndex];
            document.getElementById('wordText').innerText = card.word;
            document.getElementById('wordDefinition').innerText = card.definition;
            document.getElementById('wordExample').innerText = card.example;
            document.getElementById('wordLevel').innerText = card.level;
            document.getElementById('flashcard').classList.remove('flipped');
            document.getElementById('gradingButtons').classList.add('hidden');
            document.getElementById('writingInput').value = "";
            document.getElementById('speechResult').innerText = "";
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
            document.getElementById('gradingButtons').classList.toggle('hidden');
        }

        // Text to Speech (Listening Skill)
        function speakWord() {
            const msg = new SpeechSynthesisUtterance(vocabulary[currentCardIndex].word);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        // Speech to Text (Speaking Skill)
        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.start();
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const target = vocabulary[currentCardIndex].word.toLowerCase();
                const resultDisplay = document.getElementById('speechResult');
                
                if(transcript === target) {
                    resultDisplay.innerHTML = `<span class="text-green-600 font-bold">Chính xác! (${transcript})</span>`;
                } else {
                    resultDisplay.innerHTML = `<span class="text-red-600">Thử lại: ${transcript}</span>`;
                }
            };
        }

        // Logic Spaced Repetition
        function gradeWord(quality) {
            let card = vocabulary[currentCardIndex];
            
            // SM-2 Logic đơn giản hóa
            if (quality >= 3) {
                if (card.repetition === 0) card.interval = 1;
                else if (card.repetition === 1) card.interval = 6;
                else card.interval = Math.round(card.interval * card.efactor);
                card.repetition++;
            } else {
                card.repetition = 0;
                card.interval = 1;
            }
            
            card.efactor = card.efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
            if (card.efactor < 1.3) card.efactor = 1.3;
            
            card.dueDate = Date.now() + card.interval * 24 * 60 * 60 * 1000;

            localStorage.setItem('myVocab', JSON.stringify(vocabulary));
            nextCard();
        }

        function nextCard() {
            currentCardIndex = (currentCardIndex + 1) % vocabulary.length;
            showCard();
            updateStats();
        }

        function updateStats() {
            document.getElementById('newWords').innerText = vocabulary.filter(v => v.repetition === 0).length;
            document.getElementById('reviewWords').innerText = vocabulary.filter(v => v.dueDate <= Date.now()).length;
        }

        // Tải file JSON cá nhân
        document.getElementById('csvUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imported = JSON.parse(event.target.result);
                vocabulary = imported.map(item => ({
                    ...item,
                    interval: 1, repetition: 0, efactor: 2.5, dueDate: Date.now()
                }));
                localStorage.setItem('myVocab', JSON.stringify(vocabulary));
                init();
            };
            reader.readAsText(e.target.files[0]);
        });

        init();
    </script>
</body>
</html>
