<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Flow - Spaced Repetition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden-text { filter: blur(5px); transition: 0.3s; cursor: pointer; }
        .hidden-text:hover { filter: blur(0); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <nav class="bg-white border-b-2 border-gray-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-green-600 tracking-tighter">EN-FLOW</h1>
            <div class="flex gap-6 font-bold">
                <span title="Chuỗi ngày học tập"><i class="fas fa-fire text-orange-500"></i> <span id="streak-val">0</span></span>
                <span title="Kinh nghiệm"><i class="fas fa-bolt text-yellow-500"></i> <span id="exp-val">0</span> XP</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 py-8">
        <div id="dashboard-view">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-gray-200 col-span-2">
                    <h2 class="text-xl font-bold mb-2">Chào mừng trở lại! 👋</h2>
                    <p class="text-gray-500 mb-4">Hôm nay bạn có <span class="font-bold text-blue-600">5 từ cần ôn tập</span> theo phương pháp SRS.</p>
                    <button onclick="startLesson()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-2xl shadow-[0_4px_0_rgb(22,163,74)] active:shadow-none active:translate-y-1 transition-all">
                        HỌC NGAY
                    </button>
                </div>
                <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg flex flex-col justify-center">
                    <p class="opacity-80">Tiến độ tổng quát</p>
                    <h3 class="text-3xl font-bold mb-2">A2 Level</h3>
                    <div class="w-full bg-blue-400 rounded-full h-2">
                        <div class="bg-white h-2 rounded-full" style="width: 65%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border-2 border-dashed border-gray-300 text-center mb-8">
                <p class="mb-4 font-medium">Bạn có tệp từ vựng riêng? (JSON format)</p>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(event)">
                <label for="fileInput" class="cursor-pointer bg-gray-100 hover:bg-gray-200 py-2 px-6 rounded-xl border border-gray-300 inline-block transition-all">
                    <i class="fas fa-upload mr-2"></i> Tải tệp lên
                </label>
            </div>
        </div>

        <div id="learning-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="exitLesson()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                <div class="flex-1 mx-4 bg-gray-200 rounded-full h-3">
                    <div id="lesson-progress" class="bg-green-500 h-3 rounded-full transition-all w-0"></div>
                </div>
            </div>

            <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-sm border-2 border-gray-200 min-h-[400px] flex flex-col items-center justify-center text-center">
                </div>

            <div id="ai-feedback" class="hidden mt-4 p-4 rounded-2xl bg-red-50 border-2 border-red-100 text-red-700 font-medium animate-bounce">
                </div>
        </div>
    </main>

    <script>
        // --- DATA & CONFIG ---
        const defaultVocab = [
            { id: 1, word: "Commitment", meaning: "Sự cam kết", level: "B1", type: "writing" },
            { id: 2, word: "Innovation", meaning: "Sự đổi mới", level: "B1", type: "listening" },
            { id: 3, word: "Sustainable", meaning: "Bền vững", level: "B1", type: "writing" }
        ];

        let userStats = JSON.parse(localStorage.getItem('en_flow_stats')) || { exp: 0, streak: 0, lastDate: null };
        let currentVocab = JSON.parse(localStorage.getItem('custom_vocab')) || defaultVocab;
        let currentIndex = 0;
        let currentScore = 0;

        // --- CORE LOGIC ---
        function updateStatsUI() {
            document.getElementById('exp-val').innerText = userStats.exp;
            document.getElementById('streak-val').innerText = userStats.streak;
        }

        function startLesson() {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('learning-view').classList.remove('hidden');
            renderQuestion();
        }

        function exitLesson() {
            location.reload();
        }

        function renderQuestion() {
            const item = currentVocab[currentIndex];
            const container = document.getElementById('quiz-container');
            const progress = (currentIndex / currentVocab.length) * 100;
            document.getElementById('lesson-progress').style.width = `${progress}%`;

            if (item.type === 'listening') {
                container.innerHTML = `
                    <div class="mb-6"><i class="fas fa-volume-up text-5xl text-blue-500 cursor-pointer" onclick="speak('${item.word}')"></i></div>
                    <h3 class="text-xl font-bold mb-6">Nghe và viết lại từ này</h3>
                    <input type="text" id="answer-input" class="w-full max-w-md p-4 border-2 border-gray-200 rounded-2xl text-center text-xl outline-none focus:border-blue-400" placeholder="...">
                    <button onclick="checkAnswer()" class="mt-8 bg-blue-500 text-white px-10 py-3 rounded-2xl font-bold">KIỂM TRA</button>
                `;
                speak(item.word);
            } else {
                container.innerHTML = `
                    <p class="text-gray-500 mb-2 font-bold uppercase tracking-widest text-sm">Dịch sang tiếng Anh</p>
                    <h2 class="text-3xl font-black mb-8">"${item.meaning}"</h2>
                    <input type="text" id="answer-input" class="w-full max-w-md p-4 border-2 border-gray-200 rounded-2xl text-center text-xl outline-none focus:border-green-400" placeholder="...">
                    <button onclick="checkAnswer()" class="mt-8 bg-green-500 text-white px-10 py-3 rounded-2xl font-bold">KIỂM TRA</button>
                `;
            }
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input').value.trim().toLowerCase();
            const correct = currentVocab[currentIndex].word.toLowerCase();
            const feedbackBox = document.getElementById('ai-feedback');

            if (input === correct) {
                feedbackBox.classList.add('hidden');
                userStats.exp += 10;
                currentIndex++;
                
                if (currentIndex < currentVocab.length) {
                    renderQuestion();
                } else {
                    alert("Chúc mừng! Bạn đã hoàn thành bài học!");
                    saveStats();
                    exitLesson();
                }
            } else {
                // Giả lập AI giải thích lỗi
                feedbackBox.classList.remove('hidden');
                feedbackBox.innerHTML = `<i class="fas fa-robot mr-2"></i> AI: Bạn viết sai rồi. Từ đúng là <b>"${correct}"</b>. Hãy kiểm tra lại chính tả nhé!`;
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.setItem('custom_vocab', JSON.stringify(data));
                    alert("Đã tải từ vựng mới thành công!");
                    location.reload();
                } catch (err) {
                    alert("File không đúng định dạng JSON!");
                }
            };
            reader.readAsText(file);
        }

        function saveStats() {
            localStorage.setItem('en_flow_stats', JSON.stringify(userStats));
        }

        // Khởi tạo
        updateStatsUI();
    </script>
</body>
</html>
