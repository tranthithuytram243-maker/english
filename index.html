<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest - Quizizz Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #461a42; }
        .quizizz-card {
            background: white;
            border-bottom: 5px solid #e5e5e5;
            transition: all 0.2s;
        }
        .btn-quizizz {
            border-bottom: 4px solid rgba(0,0,0,0.2);
            transition: transform 0.1s, border-bottom 0.1s;
        }
        .btn-quizizz:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .progress-bar {
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* Hiệu ứng lật thẻ mượt mà */
        .card-container { perspective: 1000px; }
        .card-flip {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .flipped { transform: rotateY(180deg); }
        .face {
            backface-visibility: hidden;
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .face-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-[#2d033b] p-4 text-white flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <div class="bg-pink-500 p-2 rounded-lg font-bold">EQ</div>
            <div class="w-48 h-3 bg-gray-700 rounded-full overflow-hidden">
                <div id="topProgressBar" class="progress-bar h-full bg-green-400" style="width: 0%"></div>
            </div>
        </div>
        <div class="flex gap-4 font-bold">
            <span class="text-yellow-400"><i class="fas fa-bolt"></i> <span id="streakCount">0</span></span>
            <span id="timerDisplay" class="bg-[#461a42] px-3 py-1 rounded">00:00</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        
        <div id="gameZone" class="space-y-6">
            
            <div class="card-container h-[400px]">
                <div id="mainCard" class="card-flip w-full h-full">
                    <div class="face quizizz-card rounded-3xl p-8 shadow-2xl">
                        <span class="absolute top-6 left-6 bg-purple-100 text-purple-700 px-4 py-1 rounded-full font-bold" id="badgeLevel">B1</span>
                        <h2 id="displayWord" class="text-6xl font-bold text-[#2d033b] mb-6">Environment</h2>
                        <button onclick="playSound(event)" class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full hover:bg-indigo-200 transition text-2xl">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <p class="mt-8 text-gray-400 font-bold uppercase tracking-widest text-sm">Nhấn để xem đáp án</p>
                    </div>

                    <div class="face face-back quizizz-card rounded-3xl p-8 shadow-2xl border-t-8 border-green-400">
                        <h3 id="displayMeaning" class="text-4xl font-bold text-green-600 mb-2">Môi trường</h3>
                        <p id="displayExample" class="text-xl text-gray-500 italic mb-8">"We must protect our environment."</p>
                        
                        <div class="grid grid-cols-3 gap-3 w-full max-w-md">
                            <button onclick="handleGrade(1)" class="btn-quizizz bg-red-500 text-white p-4 rounded-xl font-bold">Quên ❌</button>
                            <button onclick="handleGrade(3)" class="btn-quizizz bg-orange-400 text-white p-4 rounded-xl font-bold">Khó 🧠</button>
                            <button onclick="handleGrade(5)" class="btn-quizizz bg-green-500 text-white p-4 rounded-xl font-bold">Dễ ✅</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-[#8854c0] p-6 rounded-2xl text-white shadow-xl">
                    <label class="block mb-2 font-bold"><i class="fas fa-keyboard mr-2"></i>Thử thách viết:</label>
                    <input type="text" id="quizInput" oninput="checkWriting()" placeholder="Nhập từ tiếng Anh..." 
                        class="w-full p-3 rounded-xl border-none text-gray-800 font-bold focus:ring-4 focus:ring-yellow-400 outline-none">
                </div>

                <div class="bg-[#2d9da6] p-6 rounded-2xl text-white shadow-xl flex flex-col justify-center">
                    <button id="micBtn" onclick="startSpeech()" class="btn-quizizz bg-white text-[#2d9da6] py-3 rounded-xl font-extrabold text-lg">
                        <i class="fas fa-microphone mr-2"></i>NHẤN ĐỂ NÓI
                    </button>
                    <p id="speechStatus" class="text-center mt-2 text-sm font-bold opacity-80"></p>
                </div>
            </div>

            <div class="flex justify-center pt-4">
                <label class="cursor-pointer bg-white/10 text-white px-6 py-2 rounded-full border border-white/20 hover:bg-white/20 transition">
                    <i class="fas fa-file-import mr-2"></i> Tải file JSON của bạn
                    <input type="file" id="jsonInput" accept=".json" class="hidden">
                </label>
            </div>
        </div>
    </main>

    <script>
        let vocabData = [
            { word: "Magnificent", definition: "Tráng lệ", level: "B1", example: "The view is magnificent.", interval: 1, repetition: 0, efactor: 2.5, dueDate: 0 },
            { word: "Opportunity", definition: "Cơ hội", level: "B1", example: "A great opportunity to learn.", interval: 1, repetition: 0, efactor: 2.5, dueDate: 0 },
            { word: "Simple", definition: "Đơn giản", level: "A1", example: "It's a simple task.", interval: 1, repetition: 0, efactor: 2.5, dueDate: 0 }
        ];

        let currentCard = null;
        let streak = 0;
        let wordsMastered = 0;

        function init() {
            const saved = localStorage.getItem('quizizzVocab');
            if(saved) vocabData = JSON.parse(saved);
            
            // Lật thẻ khi click vào card
            document.getElementById('mainCard').addEventListener('click', function() {
                this.classList.toggle('flipped');
            });

            nextQuestion();
        }

        function nextQuestion() {
            // Reset giao diện
            document.getElementById('mainCard').classList.remove('flipped');
            document.getElementById('quizInput').value = "";
            document.getElementById('quizInput').classList.remove('bg-green-200');
            document.getElementById('speechStatus').innerText = "";

            // Chọn từ ngẫu nhiên (Ưu tiên từ chưa học hoặc đến hạn)
            const available = vocabData.filter(v => v.dueDate <= Date.now());
            currentCard = available.length > 0 
                ? available[Math.floor(Math.random() * available.length)]
                : vocabData[Math.floor(Math.random() * vocabData.length)];

            // Hiển thị dữ liệu
            document.getElementById('displayWord').innerText = currentCard.word;
            document.getElementById('displayMeaning').innerText = currentCard.definition;
            document.getElementById('displayExample').innerText = currentCard.example;
            document.getElementById('badgeLevel').innerText = currentCard.level;
            
            updateProgress();
        }

        function handleGrade(q) {
            // Logic Spaced Repetition (SM-2)
            if (q >= 3) {
                streak++;
                wordsMastered++;
                currentCard.repetition++;
                currentCard.interval = currentCard.repetition === 1 ? 1 : (currentCard.repetition === 2 ? 6 : Math.round(currentCard.interval * currentCard.efactor));
            } else {
                streak = 0;
                currentCard.repetition = 0;
                currentCard.interval = 1;
            }
            
            currentCard.dueDate = Date.now() + (currentCard.interval * 24 * 60 * 60 * 1000);
            saveData();
            
            // Hiệu ứng chuyển cảnh Quizizz
            document.getElementById('streakCount').innerText = streak;
            setTimeout(nextQuestion, 300);
        }

        function checkWriting() {
            const val = document.getElementById('quizInput').value.toLowerCase().trim();
            if(val === currentCard.word.toLowerCase()) {
                document.getElementById('quizInput').classList.add('bg-green-200');
                // Tự động lật thẻ sau khi viết đúng
                setTimeout(() => document.getElementById('mainCard').classList.add('flipped'), 500);
            }
        }

        function startSpeech() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            document.getElementById('speechStatus').innerText = "Đang nghe... 🎤";
            recognition.start();

            recognition.onresult = (e) => {
                const result = e.results[0][0].transcript.toLowerCase();
                if(result.includes(currentCard.word.toLowerCase())) {
                    document.getElementById('speechStatus').innerText = "Tuyệt vời! 🔥";
                    setTimeout(() => document.getElementById('mainCard').classList.add('flipped'), 500);
                } else {
                    document.getElementById('speechStatus').innerText = `Bạn nói: "${result}"? Thử lại xem!`;
                }
            };
        }

        function playSound(e) {
            e.stopPropagation(); // Không lật thẻ khi bấm loa
            const msg = new SpeechSynthesisUtterance(currentCard.word);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function updateProgress() {
            const percent = (wordsMastered / vocabData.length) * 100;
            document.getElementById('topProgressBar').style.width = `${percent}%`;
        }

        function saveData() {
            localStorage.setItem('quizizzVocab', JSON.stringify(vocabData));
        }

        // Import file
        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                vocabData = JSON.parse(event.target.result).map(v => ({
                    ...v, interval: 1, repetition: 0, efactor: 2.5, dueDate: 0
                }));
                saveData();
                nextQuestion();
            };
            reader.readAsText(e.target.files[0]);
        });

        init();
    </script>
</body>
</html>
