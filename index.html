<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pro - Spaced Repetition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --duo-green: #58cc02; --duo-blue: #1cb0f6; }
        .btn-primary { 
            box-shadow: 0 4px 0 #46a302; transition: all 0.1s; 
        }
        .btn-primary:active { transform: translateY(4px); box-shadow: none; }
        .nav-item { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .nav-item:hover { background: #f3f4f6; }
        .nav-active { color: #1cb0f6; background: #e0f2fe !important; }
        section { display: none; }
        section.active { display: block; }
    </style>
</head>
<body class="bg-white md:bg-gray-50 min-h-screen font-sans">

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-gray-200 p-2 flex justify-around z-50 
                md:top-0 md:left-0 md:w-64 md:h-full md:border-t-0 md:border-r-2 md:flex-col md:justify-start md:p-4">
        <h1 class="hidden md:block text-3xl font-black text-green-500 mb-8 px-4">LingoFlow</h1>
        
        <div onclick="showPage('home')" id="nav-home" class="nav-item nav-active flex flex-col md:flex-row items-center p-3 gap-3">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs md:text-lg font-bold">TRANG CHỦ</span>
        </div>
        <div onclick="showPage('learn')" id="nav-learn" class="nav-item flex flex-col md:flex-row items-center p-3 gap-3">
            <i class="fas fa-book text-xl"></i>
            <span class="text-xs md:text-lg font-bold">HỌC TẬP</span>
        </div>
        <div onclick="showPage('profile')" id="nav-profile" class="nav-item flex flex-col md:flex-row items-center p-3 gap-3">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs md:text-lg font-bold">HỒ SƠ</span>
        </div>
    </nav>

    <main class="md:ml-64 p-4 pb-24 md:pb-8">
        <header class="max-w-3xl mx-auto flex justify-between items-center py-4 mb-6">
            <div class="flex gap-4">
                <span class="font-bold text-orange-500"><i class="fas fa-fire"></i> <span id="streak-count">0</span></span>
                <span class="font-bold text-blue-500"><i class="fas fa-bolt"></i> <span id="exp-count">0</span></span>
            </div>
            <div class="w-10 h-10 rounded-full bg-purple-500 flex items-center justify-center text-white">
                <i class="fas fa-user"></i>
            </div>
        </header>

        <section id="page-home" class="active max-w-2xl mx-auto space-y-6">
            <div class="bg-blue-500 text-white p-8 rounded-3xl shadow-lg relative overflow-hidden">
                <h2 class="text-2xl font-black mb-2 relative z-10">Tiếp tục hành trình!</h2>
                <p class="mb-4 opacity-90 relative z-10">Bạn đang ở cấp độ B1. Đừng bỏ lỡ chuỗi học tập!</p>
                <button onclick="showPage('learn')" class="bg-white text-blue-500 font-bold py-2 px-6 rounded-xl hover:bg-gray-100 transition-colors relative z-10">
                    BẮT ĐẦU ÔN TẬP
                </button>
                <i class="fas fa-graduation-cap absolute -right-4 -bottom-4 text-8xl opacity-20 rotate-12"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white border-2 border-gray-200 p-4 rounded-2xl">
                    <p class="text-gray-400 font-bold text-sm">TỔNG EXP</p>
                    <h3 class="text-2xl font-black" id="total-exp-display">0</h3>
                </div>
                <div class="bg-white border-2 border-gray-200 p-4 rounded-2xl">
                    <p class="text-gray-400 font-bold text-sm">HẠNG HIỆN TẠI</p>
                    <h3 class="text-2xl font-black text-yellow-500">Gold</h3>
                </div>
            </div>
        </section>

        <section id="page-learn" class="max-w-2xl mx-auto">
            <div id="lesson-container">
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden border-2 border-gray-100">
                        <div id="progress-bar" class="bg-green-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
                <div id="quiz-box" class="min-h-[400px] flex flex-col items-center justify-center text-center">
                    </div>
            </div>
            <div id="ai-feedback" class="fixed bottom-20 left-0 right-0 md:left-64 p-6 bg-white border-t-4 border-red-500 hidden transform translate-y-full transition-transform">
                <div class="max-w-2xl mx-auto flex gap-4">
                    <i class="fas fa-times-circle text-red-500 text-3xl"></i>
                    <div>
                        <h4 class="font-black text-red-500">Giải thích từ AI:</h4>
                        <p id="ai-explanation" class="text-gray-700"></p>
                        <button onclick="nextQuestion()" class="mt-4 bg-red-500 text-white font-bold py-2 px-6 rounded-xl">ĐÃ HIỂU</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-profile" class="max-w-2xl mx-auto space-y-6">
            <div class="bg-white border-2 border-gray-200 p-8 rounded-3xl text-center">
                <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto mb-4 flex items-center justify-center border-4 border-white shadow-md">
                    <i class="fas fa-camera text-gray-400 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-black">Người học tiếng Anh</h2>
                <p class="text-gray-500">Tham gia từ: Tháng 6, 2026</p>
            </div>
            
            <div class="bg-white border-2 border-gray-200 p-6 rounded-3xl">
                <h3 class="font-black text-xl mb-4">Cài đặt từ vựng</h3>
                <input type="file" id="vocabUpload" class="hidden" onchange="importVocab(event)">
                <label for="vocabUpload" class="w-full flex items-center justify-center gap-3 p-4 border-2 border-dashed border-gray-300 rounded-2xl cursor-pointer hover:bg-gray-50 transition-all">
                    <i class="fas fa-file-import text-blue-500"></i>
                    <span class="font-bold text-gray-600">Nhập dữ liệu JSON của bạn</span>
                </label>
            </div>
        </section>
    </main>

    <script>
        // Quản lý trạng thái
        let state = {
            exp: parseInt(localStorage.getItem('exp')) || 0,
            streak: parseInt(localStorage.getItem('streak')) || 0,
            vocab: JSON.parse(localStorage.getItem('vocab')) || [
                { q: "Hello", a: "Xin chào", type: "writing" },
                { q: "Independence", a: "Độc lập", type: "listening" },
                { q: "Challenge", a: "Thử thách", type: "writing" }
            ],
            currentIndex: 0
        };

        // Điều hướng trang
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.getElementById(`nav-${pageId}`).classList.add('nav-active');

            if(pageId === 'learn') startLesson();
            updateUI();
        }

        function updateUI() {
            document.getElementById('streak-count').innerText = state.streak;
            document.getElementById('exp-count').innerText = state.exp;
            document.getElementById('total-exp-display').innerText = state.exp;
        }

        // Logic học tập
        function startLesson() {
            state.currentIndex = 0;
            renderQuiz();
        }

        function renderQuiz() {
            const item = state.vocab[state.currentIndex];
            const quizBox = document.getElementById('quiz-box');
            const progress = (state.currentIndex / state.vocab.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            if (item.type === 'listening') {
                quizBox.innerHTML = `
                    <div class="mb-8 p-6 bg-blue-100 rounded-full cursor-pointer hover:bg-blue-200 transition-all" onclick="speak('${item.q}')">
                        <i class="fas fa-volume-up text-4xl text-blue-600"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-8 text-gray-400">Nghe và viết lại</h2>
                    <input type="text" id="answer-in" placeholder="Gõ câu trả lời..." class="w-full max-w-md p-4 border-2 border-gray-200 rounded-2xl text-xl outline-none focus:border-blue-400 text-center">
                    <button onclick="checkAnswer()" class="btn-primary mt-8 w-full max-w-md bg-green-500 text-white py-4 rounded-2xl font-black text-xl">KIỂM TRA</button>
                `;
                speak(item.q);
            } else {
                quizBox.innerHTML = `
                    <h2 class="text-lg font-bold text-gray-400 mb-2">DỊCH CÂU NÀY</h2>
                    <div class="text-3xl font-black mb-10">"${item.a}"</div>
                    <input type="text" id="answer-in" placeholder="Dịch sang tiếng Anh..." class="w-full max-w-md p-4 border-2 border-gray-200 rounded-2xl text-xl outline-none focus:border-green-400 text-center">
                    <button onclick="checkAnswer()" class="btn-primary mt-8 w-full max-w-md bg-green-500 text-white py-4 rounded-2xl font-black text-xl">KIỂM TRA</button>
                `;
            }
        }

        function checkAnswer() {
            const input = document.getElementById('answer-in').value.trim().toLowerCase();
            const correct = state.vocab[state.currentIndex].q.toLowerCase();
            
            if (input === correct) {
                state.exp += 15;
                state.currentIndex++;
                saveData();
                if (state.currentIndex >= state.vocab.length) {
                    finishLesson();
                } else {
                    renderQuiz();
                }
            } else {
                showAIError(`Bạn đã nhầm lẫn. Câu trả lời đúng là "${correct}". Lưu ý về cách chia động từ hoặc chính tả nhé!`);
            }
        }

        function showAIError(msg) {
            const panel = document.getElementById('ai-feedback');
            document.getElementById('ai-explanation').innerText = msg;
            panel.classList.remove('hidden');
            panel.style.transform = "translateY(0)";
        }

        function nextQuestion() {
            const panel = document.getElementById('ai-feedback');
            panel.style.transform = "translateY(100%)";
            setTimeout(() => panel.classList.add('hidden'), 300);
            renderQuiz();
        }

        function finishLesson() {
            alert("Tuyệt vời! +50 EXP thưởng!");
            state.exp += 50;
            state.streak += 1;
            saveData();
            showPage('home');
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function saveData() {
            localStorage.setItem('exp', state.exp);
            localStorage.setItem('streak', state.streak);
            updateUI();
        }

        function importVocab(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                state.vocab = JSON.parse(e.target.result);
                localStorage.setItem('vocab', JSON.stringify(state.vocab));
                alert("Đã nhập dữ liệu thành công!");
            };
            reader.readAsText(file);
        }

        // Khởi tạo app
        updateUI();
    </script>
</body>
</html>
